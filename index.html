<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zyqrin Ultimate Shop</title>
<style>
:root{
 --primary:#3b82f6;
 --accent:#22d3ee;
 --bg:#0f172a;
 --card:rgba(255,255,255,0.06);
}
body{
 margin:0;
 font-family:Segoe UI,sans-serif;
 background:var(--bg);
 color:white;
 overflow-x:hidden;
 transition:.4s;
}
canvas{
 position:fixed; top:0; left:0;
 width:100%; height:100%;
 z-index:-1;
}
header{
 padding:20px;
 display:flex;
 justify-content:space-between;
 align-items:center;
 backdrop-filter:blur(15px);
 background:rgba(0,0,0,0.4);
}
header h1{
 margin:0;
 background:linear-gradient(90deg,#3b82f6,#22d3ee);
 -webkit-background-clip:text;
 -webkit-text-fill-color:transparent;
}
.toggle{
 padding:8px 15px;
 border-radius:20px;
 border:1px solid #38bdf8;
 background:transparent;
 color:#38bdf8;
 cursor:pointer;
}
.container{padding:20px; max-width:1100px; margin:auto}
.shop-grid{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
 gap:25px;
}
.card{
 background:var(--card);
 border-radius:20px;
 overflow:hidden;
 backdrop-filter:blur(15px);
 border:1px solid rgba(255,255,255,0.1);
}
.slider{ position:relative; height:220px; overflow:hidden; }
.slides{ display:flex; height:100%; transition:transform .5s ease; }
.slides img{ width:100%; object-fit:cover; flex-shrink:0; cursor:pointer; }
.dots{ position:absolute; bottom:10px; width:100%; text-align:center; }
.dot{ display:inline-block; width:8px; height:8px; background:rgba(255,255,255,0.4); border-radius:50%; margin:0 3px; }
.dot.active{ background:#38bdf8; }
.content{padding:18px}
.price{ font-weight:bold; color:#38bdf8; margin:10px 0; }
.buy{ width:100%; padding:12px; border:none; border-radius:10px; background:linear-gradient(90deg,#3b82f6,#06b6d4); color:white; font-weight:bold; cursor:pointer; }
.skeleton{ height:350px; border-radius:20px; animation:pulse 1.2s infinite; background:linear-gradient(90deg,#1e293b,#334155,#1e293b); background-size:200% 100%; }
@keyframes pulse{0%{background-position:200% 0} 100%{background-position:-200% 0}}
.neon{ --bg:#050816; --card:rgba(0,255,255,0.05); }
.neon .price{ color:#00ffff; text-shadow:0 0 10px #00ffff; }

/* FULLSCREEN MODAL */
#imgModal{
 display:none;
 position:fixed; inset:0;
 background:rgba(0,0,0,0.95);
 justify-content:center; align-items:center;
 z-index:9999;
}
#imgModal img{
 max-width:95%; max-height:85%; border-radius:15px;
}
.prev-btn,.next-btn{
 position:absolute; top:50%;
 transform:translateY(-50%);
 font-size:50px; color:white; cursor:pointer; user-select:none;
 padding:10px; background:rgba(0,0,0,0.3); border-radius:50%;
}
.prev-btn{ left:20px; }
.next-btn{ right:20px; }
#counter{
 position:absolute; bottom:30px; color:white; font-size:18px;
}
.close-btn{
 position:absolute; top:20px; right:30px; font-size:40px; color:white; cursor:pointer;
}
</style>
</head>
<body>

<canvas id="particles"></canvas>

<header>
<h1>🎮Leyeshop</h1>
<button class="toggle" onclick="toggleMode()">🌙 Toggle</button>
</header>

<div class="container">
<div class="shop-grid" id="grid">
<div class="skeleton"></div>
</div>
</div>

<!-- FULLSCREEN IMAGE MODAL -->
<div id="imgModal">
 <span class="close-btn" onclick="closeModal()">&times;</span>
 <span class="prev-btn" onclick="prevSlide()">&#10094;</span>
 <span class="next-btn" onclick="nextSlide()">&#10095;</span>
 <div id="counter"></div>
 <img id="modalImage">
</div>

<script>
// PRODUCTS ARRAY
const products=[
{
 id:'p1',
 title:'🔥 Premium Fruit',
 price:'5000₮',
 images:[
  'https://res.cloudinary.com/du1inlh9j/image/upload/v1772444880/wfin0jagouididjsbjd0.jpg',
 ]
},
{
 id:'p2',
 title:'Blox Fruit Account ',
 price:'7000₮',
 images:[
  'https://res.cloudinary.com/du1inlh9j/image/upload/v1772447083/s6aaabxzvqronwxuyz8w.jpg',
 ]
},
{
 id:'p3',
 title:'Escape Tsunami For Brainrot Devine',
 price:'500₮ 28Ш',
 images:[
 'https://res.cloudinary.com/du1inlh9j/image/upload/v1772456846/kbt15i8accz0gfvj0zim.jpg',
  ]
},
{
 id:'p4',
 title:'SAB ',
 price:'All Secret 500₮',
 images:[
  'https://res.cloudinary.com/du1inlh9j/image/upload/v1772448584/ddvx8upwbbj9vgasepff.jpg',
  'https://res.cloudinary.com/du1inlh9j/image/upload/v1772448610/ydd0hywejigqkgwpp8zx.jpg',
  'https://res.cloudinary.com/du1inlh9j/image/upload/v1772448627/a78r2apfqu69zkeiyecc.jpg',
  'https://res.cloudinary.com/du1inlh9j/image/upload/v1772448668/h8iuypekx5epbrhfeghh.jpg',
  
 ]
}
];

const grid=document.getElementById('grid');
setTimeout(render,500);

// RENDER SHOP GRID
function render(){
 grid.innerHTML='';
 products.forEach(p=>{
  let slideHTML=p.images.map(img=>`<img src="${img}" onclick="openModal('${img}','${p.id}')">`).join('');
  let dotsHTML=p.images.map((_,i)=>`<span class="dot ${i==0?'active':''}"></span>`).join('');
  grid.innerHTML+=`
  <div class="card">
   <div class="slider" ontouchstart="touchStart(event,'${p.id}')" ontouchend="touchEnd(event,'${p.id}')">
    <div class="slides" id="slide-${p.id}">
     ${slideHTML}
    </div>
    <div class="dots" id="dots-${p.id}">${dotsHTML}</div>
   </div>
   <div class="content">
    <h3>${p.title}</h3>
    <div class="price">${p.price}</div>
    <button class="buy" onclick="buy()">Худалдан авах</button>
   </div>
  </div>`;
  autoSlide(p.id,p.images.length);
});
}

// CAROUSEL AUTO SLIDE
const states={};
function autoSlide(id,total){
 states[id]=0;
 setInterval(()=>move(id,total,1),3000);
}
function move(id,total,dir){
 states[id]=(states[id]+dir+total)%total;
 document.getElementById('slide-'+id).style.transform=`translateX(-${states[id]*100}%)`;
 updateDots(id,total);
}
function updateDots(id,total){
 const dots=document.getElementById('dots-'+id).children;
 for(let i=0;i<total;i++) dots[i].classList.remove('active');
 dots[states[id]].classList.add('active');
}

// SWIPE
let startX=0;
function touchStart(e,id){startX=e.changedTouches[0].screenX;}
function touchEnd(e,id){
 let diff=e.changedTouches[0].screenX-startX;
 if(Math.abs(diff)>50) move(id,products[0].images.length,diff<0?1:-1);
}

// FULLSCREEN MODAL SLIDESHOW
let currentProduct=null;
let currentIndex=0;

function openModal(src, productId){
 currentProduct=products.find(p=>p.id===productId);
 currentIndex=currentProduct.images.indexOf(src);
 updateModal();
 document.getElementById("imgModal").style.display="flex";
}
function updateModal(){
 document.getElementById("modalImage").src=currentProduct.images[currentIndex];
 document.getElementById("counter").innerText=`${currentIndex+1}/${currentProduct.images.length}`;
}
function closeModal(){ document.getElementById("imgModal").style.display="none"; }

function nextSlide(){
 if(!currentProduct) return;
 currentIndex=(currentIndex+1)%currentProduct.images.length;
 updateModal();
}
function prevSlide(){
 if(!currentProduct) return;
 currentIndex=(currentIndex-1+currentProduct.images.length)%currentProduct.images.length;
 updateModal();
}

// BUY & TOGGLE
function buy(){ window.open("https://www.facebook.com/share/18RCQSwNSP/","_blank"); }
function toggleMode(){ document.body.classList.toggle('neon'); }

// PARTICLES
const canvas=document.getElementById('particles');
const ctx=canvas.getContext('2d');
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
let particles=[];
for(let i=0;i<60;i++){
 particles.push({ x:Math.random()*canvas.width, y:Math.random()*canvas.height, r:Math.random()*2, dx:(Math.random()-0.5)*0.5, dy:(Math.random()-0.5)*0.5 });
}
function animate(){
 ctx.clearRect(0,0,canvas.width,canvas.height);
 ctx.fillStyle="#38bdf8";
 particles.forEach(p=>{
  ctx.beginPath();
  ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
  ctx.fill();
  p.x+=p.dx; p.y+=p.dy;
 });
 requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
